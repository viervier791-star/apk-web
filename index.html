<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        header{
            background:linear-gradient(to right,#2b6cb0,#63b3ed);
            color:white;
            text-align:center;
            padding:35px;
        }

        .container{
            width:600px;
            max-width:90%;
            margin:30px auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        .container h2{
            text-align:center;
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-top:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .button{
            margin-top:20px;
        }

        button{
            padding:10px 20px;
            border:none;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        .hitung{
            background:green;
        }

        .reset{
            background:red;
        }

        .hasil{
            margin-top:25px;
            background:#f2f2f2;
            padding:20px;
            border-radius:8px;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        table td{
            padding:8px;
        }
    </style>
</head>
<body>

<header>
    <h1>Selamat Datang di Toko Elektronik</h1>
    <p>Website Perhitungan Bonus Pembelian</p>
</header>

<div class="container">

    <h2>Form Transaksi</h2>

    <label>Nama Pelanggan</label>
    <input type="text" id="pelanggan">

    <label>Nama Produk</label>
    <input type="text" id="produk">

    <label>Harga Produk</label>
    <input type="number" id="harga">

    <label>Jumlah Pembelian</label>
    <input type="number" id="jumlah">

    <div class="button">
        <button class="hitung" onclick="hitung()">Hitung</button>
        <button class="reset" onclick="resetForm()">Reset</button>
    </div>

    <div id="hasil" class="hasil"></div>

</div>

<script>
function hitung(){

    let pelanggan = document.getElementById("pelanggan").value;
    let produk = document.getElementById("produk").value;
    let harga = document.getElementById("harga").value;
    let jumlah = document.getElementById("jumlah").value;

    if(pelanggan === "" || produk === "" || harga === "" || jumlah === ""){
        alert("Semua data wajib diisi!");
        return;
    }

    harga = parseInt(harga);
    jumlah = parseInt(jumlah);

    let totalBelanja = harga * jumlah;

    let potongan = 0;

    if(totalBelanja >= 400000){
        potongan = 50000;
    }

    let totalBayar = totalBelanja - potongan;

    document.getElementById("hasil").innerHTML = `
        <h3>Hasil Perhitungan</h3>

        <table border="1">
            <tr>
                <td>Nama Pelanggan</td>
                <td>: ${pelanggan}</td>
            </tr>

            <tr>
                <td>Nama Produk</td>
                <td>: ${produk}</td>
            </tr>

            <tr>
                <td>Total Belanja</td>
                <td>: Rp ${totalBelanja.toLocaleString('id-ID')}</td>
            </tr>

            <tr>
                <td>Potongan</td>
                <td>: Rp ${potongan.toLocaleString('id-ID')}</td>
            </tr>

            <tr>
                <td><b>Total Bayar</b></td>
                <td><b>: Rp ${totalBayar.toLocaleString('id-ID')}</b></td>
            </tr>
        </table>
    `;
}

function resetForm(){
    document.getElementById("pelanggan").value = "";
    document.getElementById("produk").value = "";
    document.getElementById("harga").value = "";
    document.getElementById("jumlah").value = "";
    document.getElementById("hasil").innerHTML = "";
}
</script>

</body>
</html>
